<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Приглашение на свидание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Caveat:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F6EEE0;
    --paper-dark: #ECDFC8;
    --ink: #3B2A20;
    --ink-soft: #6b5a4d;
    --brick: #9C3B3B;
    --brick-dark: #7A2A2A;
    --gold: #B98B3E;
    --rose: #C98A82;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at top left, rgba(185,139,62,0.10), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(156,59,59,0.08), transparent 55%),
      var(--paper);
    background-attachment:fixed;
    font-family:'Inter', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    overflow-x:hidden;
  }
  .eyebrow{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    letter-spacing:.02em;
    color:var(--brick);
    font-size:14px;
    text-transform:none;
    margin:0 0 6px;
  }

  /* ---------- Creator card ---------- */
  .stage{
    width:100%;
    max-width:460px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }
  .composer{
    width:100%;
    background:var(--paper-dark);
    border:1px solid rgba(59,42,32,0.12);
    border-radius:18px;
    padding:28px 26px;
    box-shadow:0 1px 0 rgba(255,255,255,0.6) inset, 0 18px 40px -20px rgba(59,42,32,0.35);
  }
  .composer h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:26px;
    margin:0 0 4px;
    line-height:1.25;
  }
  .composer p.sub{
    margin:0 0 20px;
    color:var(--ink-soft);
    font-size:14.5px;
    line-height:1.5;
  }
  label{
    display:block;
    font-size:12.5px;
    font-weight:600;
    color:var(--ink-soft);
    margin:16px 0 6px;
    letter-spacing:.02em;
  }
  label:first-of-type{margin-top:0;}
  input[type=text], textarea{
    width:100%;
    font-family:'Inter', sans-serif;
    font-size:15px;
    padding:10px 12px;
    border:1.5px solid rgba(59,42,32,0.18);
    border-radius:10px;
    background:var(--paper);
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease;
  }
  input[type=text]:focus, textarea:focus{border-color:var(--brick);}
  textarea{resize:none;font-family:'Caveat', cursive;font-size:20px;line-height:1.3;}

  .vibe-row{display:flex;gap:8px;margin-top:8px;}
  .vibe-btn{
    flex:1;
    padding:9px 8px;
    border-radius:9px;
    border:1.5px solid rgba(59,42,32,0.18);
    background:var(--paper);
    font-family:'Inter', sans-serif;
    font-size:13px;
    color:var(--ink-soft);
    cursor:pointer;
    transition:.15s ease;
  }
  .vibe-btn.active{
    border-color:var(--brick);
    background:rgba(156,59,59,0.08);
    color:var(--brick-dark);
    font-weight:600;
  }

  .make-btn{
    width:100%;
    margin-top:22px;
    padding:13px 16px;
    border:none;
    border-radius:11px;
    background:var(--brick);
    color:var(--paper);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    letter-spacing:.01em;
    transition:background .15s ease, transform .1s ease;
  }
  .make-btn:hover{background:var(--brick-dark);}
  .make-btn:active{transform:scale(0.98);}

  .link-row{
    margin-top:16px;
    display:none;
    gap:8px;
  }
  .link-row.show{display:flex;}
  .link-row input{
    flex:1;
    font-size:12.5px;
    padding:9px 10px;
    background:var(--paper);
  }
  .copy-btn{
    padding:9px 14px;
    border-radius:9px;
    border:1.5px solid var(--brick);
    background:transparent;
    color:var(--brick);
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  .copy-btn:hover{background:rgba(156,59,59,0.08);}

  .preview-label{
    text-align:center;
    font-size:12px;
    color:var(--ink-soft);
    letter-spacing:.04em;
    text-transform:uppercase;
  }

  /* ---------- Envelope / Letter ---------- */
  .card-wrap{
    position:relative;
    width:100%;
    max-width:380px;
    perspective:1200px;
  }
  .envelope{
    position:relative;
    width:100%;
    aspect-ratio:8/5;
    cursor:pointer;
    background:linear-gradient(160deg, var(--paper-dark), var(--paper));
    border-radius:10px;
    box-shadow:0 24px 50px -22px rgba(59,42,32,0.45), 0 1px 0 rgba(255,255,255,0.5) inset;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .35s ease, opacity .35s ease;
  }
  .envelope::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(135deg, transparent 49.3%, rgba(59,42,32,0.10) 49.3%, rgba(59,42,32,0.10) 50.7%, transparent 50.7%),
      linear-gradient(45deg, transparent 49.3%, rgba(59,42,32,0.10) 49.3%, rgba(59,42,32,0.10) 50.7%, transparent 50.7%);
    border-radius:10px;
  }
  .seal{
    position:relative;
    z-index:2;
    width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #c99a4c, var(--gold) 55%, var(--brick-dark) 100%);
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    box-shadow:0 6px 14px -4px rgba(59,42,32,0.55);
    animation:pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
  }
  .envelope-hint{
    position:absolute;
    bottom:-30px;
    left:0;right:0;
    text-align:center;
    font-size:13px;
    color:var(--ink-soft);
  }
  .envelope.opening{
    transform:rotateX(90deg) scale(.9);
    opacity:0;
  }

  .letter{
    position:relative;
    width:100%;
    background:var(--paper);
    border-radius:14px;
    padding:34px 30px 30px;
    box-shadow:0 1px 0 rgba(255,255,255,0.6) inset, 0 24px 50px -20px rgba(59,42,32,0.4);
    display:none;
    transform:translateY(14px);
    opacity:0;
    transition:transform .4s ease, opacity .4s ease;
    text-align:center;
  }
  .letter.show{display:block;}
  .letter.reveal{transform:translateY(0);opacity:1;}
  .letter::before{
    content:"";
    position:absolute;
    top:0;left:20px;right:20px;height:1px;
    background:repeating-linear-gradient(to right, rgba(59,42,32,0.18) 0 6px, transparent 6px 12px);
  }
  .to-name{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:15px;
    color:var(--ink-soft);
    margin:0 0 10px;
  }
  .question{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:34px;
    line-height:1.2;
    color:var(--ink);
    margin:0 0 26px;
  }
  .btn-row{
    position:relative;
    display:flex;
    gap:14px;
    justify-content:center;
    align-items:center;
    min-height:56px;
  }
  .yes-btn{
    padding:13px 26px;
    border:none;
    border-radius:12px;
    background:var(--brick);
    color:var(--paper);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:transform .3s ease, background .15s ease;
  }
  .yes-btn:hover{background:var(--brick-dark);}
  .no-btn{
    padding:13px 22px;
    border:1.5px solid rgba(59,42,32,0.25);
    border-radius:12px;
    background:transparent;
    color:var(--ink-soft);
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:15px;
    cursor:pointer;
    position:relative;
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  }
  .no-hint{
    font-size:12px;
    color:var(--ink-soft);
    opacity:0;
    margin-top:14px;
    transition:opacity .3s ease;
  }
  .no-hint.show{opacity:.8;}

  .celebrate{
    display:none;
  }
  .celebrate.show{display:block;}
  .celebrate .stamp{
    font-size:44px;
    margin-bottom:6px;
  }
  .celebrate h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:24px;
    margin:0 0 6px;
  }
  .celebrate p{
    color:var(--ink-soft);
    font-size:14.5px;
    margin:0;
  }
  .heart{
    position:fixed;
    top:-20px;
    font-size:18px;
    pointer-events:none;
    animation:fall linear forwards;
    z-index:50;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(360deg); opacity:0; }
  }

  .make-own{
    margin-top:6px;
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:12.5px;
    text-decoration:underline;
    cursor:pointer;
  }

  @media (prefers-reduced-motion: reduce){
    .seal{animation:none;}
    .no-btn{transition:none;}
    .heart{animation:none;display:none;}
  }
</style>
</head>
<body>

<div class="stage" id="stage"></div>

<script>
const params = new URLSearchParams(location.search);
const hasInvite = params.has('to') || params.has('q');

const stage = document.getElementById('stage');

const VIBES = {
  classic: () => `Пойдёшь со мной на свидание?`,
  bold: () => `Свидание. Ты и я. Что скажешь?`,
};

function encodeState(s){
  return btoa(unescape(encodeURIComponent(JSON.stringify(s)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decodeState(str){
  try{
    let b64 = str.replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    return JSON.parse(decodeURIComponent(escape(atob(b64))));
  }catch(e){ return null; }
}

function renderComposer(){
  stage.innerHTML = `
    <div class="composer">
      <p class="eyebrow">Приглашение · черновик</p>
      <h1>Создай приглашение на свидание</h1>
      <p class="sub">Заполни поля, получи ссылку и отправь тому, кого хочешь позвать. Он увидит письмо — и не сможет нажать «нет» 😉</p>

      <label>Кого зовёшь?</label>
      <input type="text" id="toName" placeholder="Имя (необязательно)" maxlength="30">

      <label>Свой вопрос (или оставь по умолчанию)</label>
      <textarea id="question" rows="2" maxlength="80" placeholder="Пойдёшь со мной на свидание?"></textarea>

      <label>Тон</label>
      <div class="vibe-row">
        <button type="button" class="vibe-btn active" data-vibe="classic">Нежный</button>
        <button type="button" class="vibe-btn" data-vibe="bold">Дерзкий</button>
      </div>

      <button class="make-btn" id="makeBtn">Создать ссылку</button>
      <div class="link-row" id="linkRow">
        <input type="text" id="linkOut" readonly>
        <button class="copy-btn" id="copyBtn">Копировать</button>
      </div>
    </div>

    <p class="preview-label">Так это увидят</p>
    <div class="card-wrap" id="previewWrap"></div>
  `;

  let vibe = 'classic';
  stage.querySelectorAll('.vibe-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      stage.querySelectorAll('.vibe-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      vibe = b.dataset.vibe;
      updatePreview();
    });
  });

  const toName = stage.querySelector('#toName');
  const question = stage.querySelector('#question');
  toName.addEventListener('input', updatePreview);
  question.addEventListener('input', updatePreview);

  function currentState(){
    return {
      to: toName.value.trim(),
      q: question.value.trim() || VIBES[vibe](),
    };
  }

  function updatePreview(){
    renderInvite(document.getElementById('previewWrap'), currentState(), true);
  }
  updatePreview();

  document.getElementById('makeBtn').addEventListener('click', ()=>{
    const s = currentState();
    const url = `${location.origin}${location.pathname}?i=${encodeState(s)}`;
    const row = document.getElementById('linkRow');
    const out = document.getElementById('linkOut');
    out.value = url;
    row.classList.add('show');
  });
  document.getElementById('copyBtn')?.addEventListener('click', ()=>{
    const out = document.getElementById('linkOut');
    out.select();
    navigator.clipboard?.writeText(out.value);
    const btn = document.getElementById('copyBtn');
    const old = btn.textContent;
    btn.textContent = 'Готово ✓';
    setTimeout(()=>btn.textContent = old, 1400);
  });
}

function renderInvite(container, state, isPreview){
  const toName = state.to;
  const question = state.q || VIBES.classic();

  container.innerHTML = `
    <div class="envelope" id="envelope">
      <div class="seal">💌</div>
      <div class="envelope-hint">нажми, чтобы открыть</div>
    </div>
    <div class="letter" id="letter">
      ${toName ? `<p class="to-name">Дорог${/[аи]$/i.test(toName)?'ая':'ой'} ${escapeHtml(toName)},</p>` : ''}
      <p class="question">${escapeHtml(question)}</p>
      <div class="btn-row" id="btnRow">
        <button class="yes-btn" id="yesBtn">Да, конечно 😍</button>
        <button class="no-btn" id="noBtn">Нет</button>
      </div>
      <p class="no-hint" id="noHint">попробуй нажать «нет» 👆</p>
      <div class="celebrate" id="celebrate">
        <div class="stamp">🎉</div>
        <h2>Ура! Договорились</h2>
        <p>Ждём с нетерпением твоего прихода 💕</p>
      </div>
    </div>
    ${isPreview ? '' : `<button class="make-own" id="makeOwn" style="display:block;margin:18px auto 0;text-align:center;">Сделать своё приглашение</button>`}
  `;

  const envelope = container.querySelector('#envelope');
  const letter = container.querySelector('#letter');
  envelope.addEventListener('click', ()=>{
    envelope.classList.add('opening');
    setTimeout(()=>{
      envelope.style.display = 'none';
      letter.classList.add('show');
      requestAnimationFrame(()=> letter.classList.add('reveal'));
    }, 320);
  });

  const yesBtn = container.querySelector('#yesBtn');
  const noBtn = container.querySelector('#noBtn');
  const noHint = container.querySelector('#noHint');
  const btnRow = container.querySelector('#btnRow');
  const celebrate = container.querySelector('#celebrate');

  let dodges = 0;
  let hintTimer = setTimeout(()=> noHint.classList.add('show'), 1600);

  function dodge(e){
    if (isPreview) return;
    dodges++;
    clearTimeout(hintTimer);
    noHint.classList.add('show');
    const rowRect = btnRow.getBoundingClientRect();
    const maxX = Math.max(20, rowRect.width * 0.32);
    const dir = Math.random() > 0.5 ? 1 : -1;
    const dx = dir * (18 + Math.random() * maxX);
    const dy = (Math.random() - 0.5) * 26;
    noBtn.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx/6}deg)`;
    const scale = Math.max(0.55, 1 - dodges * 0.045);
    yesBtn.style.transform = `scale(${Math.min(1.25, 1 + dodges*0.02)})`;
    noBtn.style.fontSize = `${Math.max(11, 15 - dodges*0.3)}px`;
  }

  noBtn.addEventListener('pointerenter', dodge);
  noBtn.addEventListener('click', (e)=>{ e.preventDefault(); dodge(e); });

  yesBtn.addEventListener('click', ()=>{
    if (isPreview) return;
    btnRow.style.display = 'none';
    noHint.style.display = 'none';
    celebrate.classList.add('show');
    burstHearts();
  });

  container.querySelector('#makeOwn')?.addEventListener('click', ()=>{
    history.replaceState(null, '', location.pathname);
    renderComposer();
  });
}

function burstHearts(){
  const emojis = ['💕','💌','🌸','✨'];
  for (let i=0;i<24;i++){
    setTimeout(()=>{
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      h.style.left = Math.random()*100 + 'vw';
      h.style.fontSize = (14 + Math.random()*14) + 'px';
      h.style.animationDuration = (2.2 + Math.random()*1.6) + 's';
      document.body.appendChild(h);
      setTimeout(()=>h.remove(), 4200);
    }, i*60);
  }
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Entry point
const iParam = params.get('i');
if (iParam){
  const state = decodeState(iParam);
  if (state){
    stage.innerHTML = `<p class="preview-label" style="margin-bottom:4px;">Тебе письмо</p><div class="card-wrap" id="mainWrap"></div>`;
    renderInvite(document.getElementById('mainWrap'), state, false);
  } else {
    renderComposer();
  }
} else {
  renderComposer();
}
</script>
</body>
</html>
